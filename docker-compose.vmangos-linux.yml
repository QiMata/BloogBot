name: world-of-warcraft

services:
  wow-realmd:
    image: ghcr.io/mserajnik/vmangos-server:5875
    container_name: wow-realmd
    restart: unless-stopped
    command: ["/bin/sh", "/wwow-docker/start-realmd.sh"]
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "3724"]
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 2m
    environment:
      WWOW_VMANGOS_DB_HOST: ${WWOW_VMANGOS_DB_HOST:-maria-db}
      WWOW_VMANGOS_DB_PORT: ${WWOW_VMANGOS_DB_PORT:-3306}
      WWOW_VMANGOS_DB_USER: ${WWOW_VMANGOS_DB_ROOT_USER:-root}
      WWOW_VMANGOS_DB_PASSWORD: ${WWOW_VMANGOS_DB_ROOT_PASSWORD:-root}
      WWOW_VMANGOS_REALMD_PORT: ${WWOW_VMANGOS_REALMD_PORT:-3724}
    networks:
      - gameserver-net
    ports:
      - "${WWOW_VMANGOS_REALMD_PUBLISHED_PORT:-3724}:3724"
    volumes:
      - ${WWOW_VMANGOS_SERVER_CONFIG_DIR:-D:/vmangos-server}/realmd.conf:/wwow-input/realmd.conf:ro
      - ./docker/linux/vmangos:/wwow-docker:ro
      - ./docker/linux/vmangos/storage/realmd/logs:/opt/vmangos/storage/logs

  wow-mangosd:
    image: ghcr.io/mserajnik/vmangos-server:5875
    container_name: wow-mangosd
    restart: unless-stopped
    command: ["/bin/sh", "/wwow-docker/start-mangosd.sh"]
    depends_on:
      wow-realmd:
        condition: service_started
    tty: true
    stdin_open: true
    stop_grace_period: 2m
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "8085"]
      interval: 1m
      timeout: 3s
      retries: 5
      start_period: 10m
    environment:
      WWOW_VMANGOS_DB_HOST: ${WWOW_VMANGOS_DB_HOST:-maria-db}
      WWOW_VMANGOS_DB_PORT: ${WWOW_VMANGOS_DB_PORT:-3306}
      WWOW_VMANGOS_DB_USER: ${WWOW_VMANGOS_DB_ROOT_USER:-root}
      WWOW_VMANGOS_DB_PASSWORD: ${WWOW_VMANGOS_DB_ROOT_PASSWORD:-root}
      WWOW_VMANGOS_WORLD_PORT: ${WWOW_VMANGOS_WORLD_PORT:-8085}
      WWOW_VMANGOS_SOAP_PORT: ${WWOW_VMANGOS_SOAP_PORT:-7878}
    networks:
      - gameserver-net
    ports:
      - "${WWOW_VMANGOS_WORLD_PUBLISHED_PORT:-8085}:8085"
      - "${WWOW_VMANGOS_SOAP_PUBLISHED_PORT:-7878}:7878"
    volumes:
      - ${WWOW_VMANGOS_SERVER_CONFIG_DIR:-D:/vmangos-server}/mangosd.conf:/wwow-input/mangosd.conf:ro
      - ${WWOW_VMANGOS_DATA_DIR:-D:/MaNGOS/data}:/opt/vmangos/storage/data:ro
      - ./docker/linux/vmangos:/wwow-docker:ro
      - ./docker/linux/vmangos/storage/mangosd/logs:/opt/vmangos/storage/logs
      - ./docker/linux/vmangos/storage/mangosd/honor:/opt/vmangos/storage/honor

  wwow-pathfinding:
    build:
      context: .
      dockerfile: Services/PathfindingService/Dockerfile
    container_name: wwow-pathfinding
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Docker
      WWOW_DATA_DIR: /wwow-data
      WWOW_NAVIGATION_PRELOAD_MAPS: all
      Navigation__PreloadMaps: all
      Navigation__RunStartupDiagnostics: "false"
      Navigation__EnableDynamicObjectOverlay: "true"
      WWOW_ENABLE_PATHFINDING_DYNAMIC_OVERLAY: "1"
      WWOW_ROUTE_PACK_STARTUP_WARMUP: "0"
      # Enable the CalculateValidatedPath repair pipeline so the per-call
      # segment-validation memoization (commit 3b296ea4) actually fires
      # on production queries. Without this flag set, CalculateRawPath is
      # used and returns raw Detour output without engaging the cache.
      WWOW_ENABLE_PATH_REPAIR: "1"
    networks:
      - gameserver-net
    ports:
      - "9002:9002"
    volumes:
      # PFS-OVERHAUL-006: three separate mounts compose the bot's nav-data view.
      # The MaNGOS server's maps/ + vmaps/ are read-only client geometry (shared
      # source of truth, never written by the bot pipeline). The bot's mmaps/
      # are independently promoted from tests/test-data/mmaps via
      # tools/MmapGen/promote-mmaps.ps1 once a release is signed off. Three
      # separate bind mounts (rather than a single mount with junctions inside)
      # because Docker Desktop on Windows can't traverse NTFS junctions across
      # the mount boundary. See docs/physics/MMAP_DATA_FLOW.md.
      - ${WWOW_BOT_PROD_DATA_DIR:-D:/wwow-bot/prod-data}/mmaps:/wwow-data/mmaps:ro
      - ${WWOW_VMANGOS_DATA_DIR:-D:/MaNGOS/data}/maps:/wwow-data/maps:ro
      - ${WWOW_VMANGOS_DATA_DIR:-D:/MaNGOS/data}/vmaps:/wwow-data/vmaps:ro
      # scenes/ mount lets SceneQuery::EnsureMapLoaded hit the fast-path
      # LoadFromFile (~750ms) instead of falling through to live VMAP
      # extract (~30s) on first-path queries. Without this mount, the
      # 30s vs 754ms gap from project_pfs_overhaul_006_test_data_latency
      # re-emerges per service start. Sourced from prod-data per
      # project_prod_data_scenes_deployed (2026-05-15).
      - ${WWOW_BOT_PROD_DATA_DIR:-D:/wwow-bot/prod-data}/scenes:/wwow-data/scenes:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9002' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10m

  wwow-scene-data:
    build:
      context: .
      dockerfile: Services/SceneDataService/Dockerfile
    container_name: wwow-scene-data
    restart: unless-stopped
    environment:
      DOTNET_ENVIRONMENT: Docker
      WWOW_SCENE_DATA_IP: 0.0.0.0
      WWOW_SCENE_DATA_PORT: "9003"
      WWOW_DATA_DIR: /wwow-data
    networks:
      - gameserver-net
    ports:
      - "9003:9003"
    volumes:
      # PFS-OVERHAUL-006: four separate mounts (same as wwow-pathfinding,
      # plus scenes/ which only this service consumes). See
      # docs/physics/MMAP_DATA_FLOW.md. Tile mode requires
      # scenes/tiles/*.scenetile; without it Program.cs falls back to legacy
      # AABB extraction, which is incompatible with the SceneTileRequest
      # protocol the BG client now sends.
      - ${WWOW_BOT_PROD_DATA_DIR:-D:/wwow-bot/prod-data}/mmaps:/wwow-data/mmaps:ro
      - ${WWOW_VMANGOS_DATA_DIR:-D:/MaNGOS/data}/maps:/wwow-data/maps:ro
      - ${WWOW_VMANGOS_DATA_DIR:-D:/MaNGOS/data}/vmaps:/wwow-data/vmaps:ro
      - ${WWOW_VMANGOS_DATA_DIR:-D:/MaNGOS/data}/scenes:/wwow-data/scenes:ro
    healthcheck:
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/9003' || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

networks:
  gameserver-net:
    external: true
