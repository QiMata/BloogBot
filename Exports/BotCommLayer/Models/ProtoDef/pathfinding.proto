syntax = "proto3";

package pathfinding;
option csharp_namespace = "Pathfinding";

import "game.proto";

// Main request message - simplified
message PathfindingRequest {
    oneof payload {
        CalculatePathRequest path = 1;
        LineOfSightRequest los = 2;
        PhysicsInput step = 3;
        ReadyCheckRequest ready_check = 4;
        GetGroundZRequest ground_z = 5;
        BatchGroundZRequest batch_ground_z = 6;
        SegmentDynCheckRequest segment_dyn_check = 7;
        NavmeshPointRequest navmesh_point = 8;
        NearestWalkableRequest nearest_walkable = 9;
    }
}

// Main response message - simplified
message PathfindingResponse {
    oneof payload {
        CalculatePathResponse path = 1;
        LineOfSightResponse los = 2;
        PhysicsOutput step = 3;
        ReadyCheckResponse ready_status = 4;
        GetGroundZResponse ground_z = 5;
        BatchGroundZResponse batch_ground_z = 6;
        SegmentDynCheckResponse segment_dyn_check = 7;
        NavmeshPointResponse navmesh_point = 8;
        NearestWalkableResponse nearest_walkable = 9;
        Error error = 99;
    }
}

// Ready check - allows clients to query if the service is fully initialized
message ReadyCheckRequest {
    // Empty - just a ping to check status
}

message ReadyCheckResponse {
    bool is_ready = 1;                  // true when navigation data is loaded
    string status_message = 2;          // Human-readable status (e.g., "Loading maps...", "Ready")
    repeated uint32 loaded_maps = 3;    // List of map IDs that are currently loaded
}

// Error message
message Error {
    string message = 1;
}

// Path calculation
message CalculatePathRequest {
    uint32 map_id = 1;
    game.Position start = 2;
    game.Position end = 3;
    bool straight = 4;  // semantics: smoothPath flag (true = Detour smooth path, false = straight line)
    repeated DynamicObjectProto nearby_objects = 5;
    uint32 race = 6;    // Race enum for capsule radius lookup (0 = use default 0.6m)
    uint32 gender = 7;  // Gender enum for capsule height lookup (0 = use default 2.0m)
}

message CalculatePathResponse {
    repeated game.Position corners = 1;
    string result = 2;        // Path outcome: "native_path", "no_path", "validation_error", "error"
    uint32 raw_corner_count = 3;  // Corner count before sanitization (non-finite filtering)
}

// Line of sight check
message LineOfSightRequest {
    uint32 map_id = 1;
    game.Position from = 2;
    game.Position to = 3;
}

message LineOfSightResponse {
    bool in_los = 1;
}

// Ground Z query
message GetGroundZRequest {
    uint32 map_id = 1;
    game.Position position = 2;
    float max_search_dist = 3;
}

message GetGroundZResponse {
    float ground_z = 1;
    bool found = 2;
}

// Batch ground Z query — allows querying multiple positions in a single IPC round-trip.
// Primary consumer: NavigationPath.CorrectPathZFromCollision, which queries every waypoint.
message BatchGroundZRequest {
    uint32 map_id = 1;
    repeated game.Position positions = 2;
    float max_search_dist = 3;          // Applied to all entries; 0 defaults to 10.0
}

message BatchGroundZResponse {
    repeated BatchGroundZEntry results = 1;
}

message BatchGroundZEntry {
    float ground_z = 1;
    bool found = 2;
}

// Dynamic object for physics collision (elevators, doors, trophy pillars)
message DynamicObjectProto {
    uint64 guid = 1;
    uint32 display_id = 2;
    float x = 3;
    float y = 4;
    float z = 5;
    float orientation = 6;
    float scale = 7;
    uint32 go_state = 8;
}

// Physics input
message PhysicsInput {
    // Movement state
    uint32 movement_flags = 1;
    
    // Position & orientation
    float pos_x = 2;
    float pos_y = 3;
    float pos_z = 4;
    float facing = 5;
    
    // Transport
    uint64 transport_guid = 6;
    float transport_offset_x = 7;
    float transport_offset_y = 8;
    float transport_offset_z = 9;
    float transport_orientation = 10;
    
    // Swimming/flying
    float swim_pitch = 11;
    
    // Falling/jumping
    float fall_time = 12;
    float fall_start_z = 39;  // Z when fall began (fed back from output)
    
    // Spline
    float spline_elevation = 13;
    
    // Current velocity
    float vel_x = 14;
    float vel_y = 15;
    float vel_z = 16;
    
    // Movement speeds
    float walk_speed = 17;
    float run_speed = 18;
    float run_back_speed = 19;
    float swim_speed = 20;
    float swim_back_speed = 21;
    
    // Collision
    uint32 race = 22;
    uint32 gender = 23;
    
    // Context
    uint32 map_id = 24;
    float delta_time = 25;

    uint32 frame_counter = 26;

	// Previous ground normal (from prior tick output)
	float prev_ground_z = 27;
	float prev_ground_nx = 28;
	float prev_ground_ny = 29;
	float prev_ground_nz = 30;

	// Pending depenetration vector (from prior tick output)
	float pending_depen_x = 31;
	float pending_depen_y = 32;
	float pending_depen_z = 33;

	// Standing-on (ride) reference
	uint32 standing_on_instance_id = 34;
	float standing_on_local_x = 35;
	float standing_on_local_y = 36;
	float standing_on_local_z = 37;

	// Behaviour flags (bitfield)
	// PHYSICS_FLAG_TRUST_INPUT_VELOCITY (0x1): Use input vx/vy as-is for airborne
	uint32 physics_flags = 38;

	// Nearby dynamic objects for collision (elevators, doors, trophy pillars)
	repeated DynamicObjectProto nearby_objects = 40;

	// Step-up height persistence (from prior tick output)
	float step_up_base_z = 41;     // Z height to maintain (-200000 = inactive)
	uint32 step_up_age = 42;       // frames since step-up detected

	// Binary parity: CMovement grounded state persistence.
	// WoW.exe persists isGrounded in CMovement struct independently of packet flags.
	// This field carries the previous frame's physics-derived grounded state so
	// StepV2 can initialize st.isGrounded from physics state, not input packet flags.
	// Prevents FALLINGFAR feedback loops on uphill terrain.
	bool was_grounded = 43;
}

// Physics output
message PhysicsOutput {
    // New position
    float new_pos_x = 1;
    float new_pos_y = 2;
    float new_pos_z = 3;
    
    // New velocity
    float new_vel_x = 4;
    float new_vel_y = 5;
    float new_vel_z = 6;
    
    // Updated state
    uint32 movement_flags = 7;
    float orientation = 8;
    float pitch = 9;
    
    // Status flags
    bool is_grounded = 10;
    bool is_swimming = 11;
    bool is_flying = 12;
    float fall_time = 13;
    
    // Spline progress (if following path)
    int32 current_spline_index = 14;
    float spline_progress = 15;

	// Ground surface details
	float ground_z = 16;
	float ground_nx = 17;
	float ground_ny = 18;
	float ground_nz = 19;
	float liquid_z = 20;
	uint32 liquid_type = 21;

	// Pending depenetration vector for next tick
	float pending_depen_x = 22;
	float pending_depen_y = 23;
	float pending_depen_z = 24;

	// Standing-on (ride) reference
	uint32 standing_on_instance_id = 25;
	float standing_on_local_x = 26;
	float standing_on_local_y = 27;
	float standing_on_local_z = 28;

	// Fall tracking
	float fall_distance = 29;   // Total Z drop on landing (positive = downward)
	float fall_start_z = 30;    // Z when current fall began

	// Wall contact feedback — from the SIDE pass of the 3-pass physics move.
	// Path layer uses these to detect wall-blocked movement and trigger recovery.
	bool hit_wall = 31;          // true if horizontal movement was blocked by a non-walkable wall
	float wall_normal_x = 32;    // world-space wall surface normal X
	float wall_normal_y = 33;    // world-space wall surface normal Y
	float wall_normal_z = 34;    // world-space wall surface normal Z
	float blocked_fraction = 35; // fraction of requested horizontal move completed (0=fully blocked, 1=unblocked)

	// Step-up height persistence — carry forward to next frame's input
	float step_up_base_z = 36;     // Z height to maintain (-200000 = inactive)
	uint32 step_up_age = 37;       // frames since step-up detected
}

// Segment vs dynamic-objects intersection check.
// Returns true when the segment passes through a registered dynamic object
// (closed door, trophy pillar, etc.). Does NOT test static geometry.
message SegmentDynCheckRequest {
    uint32 map_id = 1;
    game.Position from = 2;
    game.Position to = 3;
}

message SegmentDynCheckResponse {
    bool intersects = 1;    // true if any dynamic-object triangle intersects the segment
}

// Navmesh point query — check if a position is on or near the navmesh
message NavmeshPointRequest {
    uint32 map_id = 1;
    game.Position position = 2;
    float search_radius = 3;   // XZ search radius (0 defaults to 4.0)
}

message NavmeshPointResponse {
    bool on_navmesh = 1;           // true if a walkable polygon was found within search radius
    game.Position nearest_point = 2;  // closest point on the navmesh surface
}

// Nearest walkable point query — find closest walkable surface and its area type
message NearestWalkableRequest {
    uint32 map_id = 1;
    game.Position position = 2;
    float search_radius = 3;   // XZ search radius (0 defaults to 8.0)
}

message NearestWalkableResponse {
    uint32 area_type = 1;          // VMaNGOS NavMeshArea (0=not found, 1=ground, 3=steep, 6=water)
    game.Position nearest_point = 2;
}
