syntax = "proto3";

package pathfinding;
option csharp_namespace = "Pathfinding";

import "game.proto";

// Main request message — path operations only.
// Physics, GroundZ, LOS, and navmesh queries are handled locally
// by the bot's in-process Navigation.dll.
message PathfindingRequest {
    oneof payload {
        CalculatePathRequest path = 1;
    }
}

// Main response message
message PathfindingResponse {
    oneof payload {
        CalculatePathResponse path = 1;
        Error error = 99;
    }
}

// Error message
message Error {
    string message = 1;
}

enum PathSegmentAffordance {
    PATH_SEGMENT_AFFORDANCE_WALK = 0;
    PATH_SEGMENT_AFFORDANCE_STEP_UP = 1;
    PATH_SEGMENT_AFFORDANCE_STEEP_CLIMB = 2;
    PATH_SEGMENT_AFFORDANCE_DROP = 3;
    PATH_SEGMENT_AFFORDANCE_CLIFF = 4;
    PATH_SEGMENT_AFFORDANCE_VERTICAL = 5;
    PATH_SEGMENT_AFFORDANCE_JUMP_GAP = 6;
    PATH_SEGMENT_AFFORDANCE_SAFE_DROP = 7;
    PATH_SEGMENT_AFFORDANCE_UNSAFE_DROP = 8;
    PATH_SEGMENT_AFFORDANCE_BLOCKED = 9;
}

// Path calculation
message CalculatePathRequest {
    uint32 map_id = 1;
    game.Position start = 2;
    game.Position end = 3;
    bool straight = 4;  // semantics: smoothPath flag (true = Detour smooth path, false = straight line)
    repeated DynamicObjectProto nearby_objects = 5;
    uint32 race = 6;    // Race enum for capsule radius lookup (0 = use default 0.6m)
    uint32 gender = 7;  // Gender enum for capsule height lookup (0 = use default 2.0m)
}

message CalculatePathResponse {
    repeated game.Position corners = 1;
    string result = 2;        // Path outcome: "native_path", "no_path", "validation_error", "error"
    uint32 raw_corner_count = 3;  // Corner count before sanitization (non-finite filtering)
    bool has_blocked_segment = 4;
    int32 blocked_segment_index = 5;
    string blocked_reason = 6;  // "none", "dynamic_overlay", "capsule_validation", ...
    PathSegmentAffordance max_affordance = 7;
    bool path_supported = 8;
    uint32 step_up_count = 9;
    uint32 drop_count = 10;
    uint32 cliff_count = 11;
    uint32 vertical_count = 12;
    float total_z_gain = 13;
    float total_z_loss = 14;
    float max_slope_angle_deg = 15;
    uint32 jump_gap_count = 16;
    uint32 safe_drop_count = 17;
    uint32 unsafe_drop_count = 18;
    uint32 blocked_count = 19;
    float max_climb_height = 20;
    float max_gap_distance = 21;
    float max_drop_height = 22;
}

// Dynamic object for physics collision (elevators, doors, trophy pillars)
message DynamicObjectProto {
    uint64 guid = 1;
    uint32 display_id = 2;
    float x = 3;
    float y = 4;
    float z = 5;
    float orientation = 6;
    float scale = 7;
    uint32 go_state = 8;
}

// Physics input/output kept as message definitions for local use (IPC between
// MovementController and in-process Navigation.dll), but NOT sent to the
// PathfindingService.
message PhysicsInput {
    // Movement state
    uint32 movement_flags = 1;

    // Position & orientation
    float pos_x = 2;
    float pos_y = 3;
    float pos_z = 4;
    float facing = 5;

    // Transport
    uint64 transport_guid = 6;
    float transport_offset_x = 7;
    float transport_offset_y = 8;
    float transport_offset_z = 9;
    float transport_orientation = 10;

    // Swimming/flying
    float swim_pitch = 11;

    // Falling/jumping
    float fall_time = 12;
    float fall_start_z = 39;  // Z when fall began (fed back from output)

    // Spline
    float spline_elevation = 13;

    // Current velocity
    float vel_x = 14;
    float vel_y = 15;
    float vel_z = 16;

    // Movement speeds
    float walk_speed = 17;
    float run_speed = 18;
    float run_back_speed = 19;
    float swim_speed = 20;
    float swim_back_speed = 21;

    // Collision
    uint32 race = 22;
    uint32 gender = 23;

    // Context
    uint32 map_id = 24;
    float delta_time = 25;

    uint32 frame_counter = 26;

	// Previous ground normal (from prior tick output)
	float prev_ground_z = 27;
	float prev_ground_nx = 28;
	float prev_ground_ny = 29;
	float prev_ground_nz = 30;

	// Pending depenetration vector (from prior tick output)
	float pending_depen_x = 31;
	float pending_depen_y = 32;
	float pending_depen_z = 33;

	// Standing-on (ride) reference
	uint32 standing_on_instance_id = 34;
	float standing_on_local_x = 35;
	float standing_on_local_y = 36;
	float standing_on_local_z = 37;

	// Behaviour flags (bitfield)
	// PHYSICS_FLAG_TRUST_INPUT_VELOCITY (0x1): Use input vx/vy as-is for airborne
	uint32 physics_flags = 38;

	// Nearby dynamic objects for collision (elevators, doors, trophy pillars)
	repeated DynamicObjectProto nearby_objects = 40;

	// Step-up height persistence (from prior tick output)
	float step_up_base_z = 41;     // Z height to maintain (-200000 = inactive)
	uint32 step_up_age = 42;       // frames since step-up detected

	// Binary parity: CMovement grounded state persistence.
	bool was_grounded = 43;
}

// Physics output
message PhysicsOutput {
    // New position
    float new_pos_x = 1;
    float new_pos_y = 2;
    float new_pos_z = 3;

    // New velocity
    float new_vel_x = 4;
    float new_vel_y = 5;
    float new_vel_z = 6;

    // Updated state
    uint32 movement_flags = 7;
    float orientation = 8;
    float pitch = 9;

    // Status flags
    bool is_grounded = 10;
    bool is_swimming = 11;
    bool is_flying = 12;
    float fall_time = 13;

    // Spline progress (if following path)
    int32 current_spline_index = 14;
    float spline_progress = 15;

	// Ground surface details
	float ground_z = 16;
	float ground_nx = 17;
	float ground_ny = 18;
	float ground_nz = 19;
	float liquid_z = 20;
	uint32 liquid_type = 21;

	// Pending depenetration vector for next tick
	float pending_depen_x = 22;
	float pending_depen_y = 23;
	float pending_depen_z = 24;

	// Standing-on (ride) reference
	uint32 standing_on_instance_id = 25;
	float standing_on_local_x = 26;
	float standing_on_local_y = 27;
	float standing_on_local_z = 28;

	// Fall tracking
	float fall_distance = 29;
	float fall_start_z = 30;

	// Wall contact feedback
	bool hit_wall = 31;
	float wall_normal_x = 32;
	float wall_normal_y = 33;
	float wall_normal_z = 34;
	float blocked_fraction = 35;

	// Step-up height persistence
	float step_up_base_z = 36;
	uint32 step_up_age = 37;

	// Runtime scene/environment classification (bitfield, see SceneEnvironmentFlags).
	uint32 environment_flags = 38;
}
