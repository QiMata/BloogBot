syntax = "proto3";

package communication;

import "game.proto";

message AsyncRequest {
    uint64 id = 1;
    oneof parameter {
        WoWActivitySnapshot activity_snapshot = 2;
        StateChangeRequest state_change = 3;
        SnapshotQueryRequest snapshot_query = 4;
        ActionForwardRequest action_forward = 5;
    }
}

// Request current activity snapshots from StateManager.
// If account_name is empty, returns snapshots for ALL connected bots.
// If account_name is set, returns snapshot for that specific bot only.
message SnapshotQueryRequest {
    string account_name = 1;
}

// Forward an ActionMessage to a specific bot via StateManager.
// StateManager routes the action to the bot identified by account_name.
message ActionForwardRequest {
    string account_name = 1;
    ActionMessage action = 2;
}

message ActionMessage {
    ActionType action_type = 1;
    repeated RequestParameter parameters = 2;
    ResponseResult actionResult = 3;
    LoadoutSpec loadout_spec = 4;   // Populated only when action_type=APPLY_LOADOUT; full per-bot prep spec handed off once so BotRunner owns execution pacing.
}

enum ActionType {
    WAIT = 0;
    GOTO = 1;
    INTERACT_WITH = 2;
    SELECT_GOSSIP = 3;
    SELECT_TAXI_NODE = 4;
    ACCEPT_QUEST = 5;
    DECLINE_QUEST = 6;
    SELECT_REWARD = 7;
    COMPLETE_QUEST = 8;
    TRAIN_SKILL = 9;
    TRAIN_TALENT = 10;
    OFFER_TRADE = 11;
    OFFER_GOLD = 12;
    OFFER_ITEM = 13;
    ACCEPT_TRADE = 14;
    DECLINE_TRADE = 15;
    ENCHANT_TRADE = 16;
    LOCKPICK_TRADE = 17;
    PROMOTE_LEADER = 18;
    PROMOTE_ASSISTANT = 19;
    PROMOTE_LOOT_MANAGER = 20;
    SET_GROUP_LOOT = 21;
    ASSIGN_LOOT = 22;
    LOOT_ROLL_NEED = 23;
    LOOT_ROLL_GREED = 24;
    LOOT_PASS = 25;
    SEND_GROUP_INVITE = 26;
    ACCEPT_GROUP_INVITE = 27;
    DECLINE_GROUP_INVITE = 28;
    KICK_PLAYER = 29;
    LEAVE_GROUP = 30;
    DISBAND_GROUP = 31;
    START_MELEE_ATTACK = 32;
    START_RANGED_ATTACK = 33;
    START_WAND_ATTACK = 34;
    STOP_ATTACK = 35;
    CAST_SPELL = 36;
    STOP_CAST = 37;
    USE_ITEM = 38;
    EQUIP_ITEM = 39;
    UNEQUIP_ITEM = 40;
    DESTROY_ITEM = 41;
    MOVE_ITEM = 42;
    SPLIT_STACK = 43;
    BUY_ITEM = 44;
    BUYBACK_ITEM = 45;
    SELL_ITEM = 46;
    REPAIR_ITEM = 47;
    REPAIR_ALL_ITEMS = 48;
    DISMISS_BUFF = 49;
    RESURRECT = 50;
    CRAFT = 51;
    LOGIN = 52;
    LOGOUT = 53;
    CREATE_CHARACTER = 54;
    DELETE_CHARACTER = 55;
    ENTER_WORLD = 56;
    LOOT_CORPSE = 57;
    RELEASE_CORPSE = 58;
    RETRIEVE_CORPSE = 59;
    SKIN_CORPSE = 60;
    GATHER_NODE = 61;
    SEND_CHAT = 62;
    SET_FACING = 63;
    VISIT_VENDOR = 64;
    VISIT_TRAINER = 65;
    VISIT_FLIGHT_MASTER = 66;
    START_FISHING = 67;
    START_GATHERING_ROUTE = 68;
    CHECK_MAIL = 69;
    START_PHYSICS_RECORDING = 70;
    STOP_PHYSICS_RECORDING = 71;
    START_DUNGEONEERING = 72;
    CONVERT_TO_RAID = 73;
    CHANGE_RAID_SUBGROUP = 74;
    FOLLOW_TARGET = 75;
    JOIN_BATTLEGROUND = 76;
    ACCEPT_BATTLEGROUND = 77;
    LEAVE_BATTLEGROUND = 78;
    TRAVEL_TO = 79;
    APPLY_LOADOUT = 80;   // P3: one-shot hand-off of full loadout spec (level, spells, skills, items, rep, quests, honor rank). BotRunner owns execution pacing; reports progress via WoWActivitySnapshot.loadout_status.
}

message ActionMap {
    repeated ActionMessage actions = 1;
}

message StateChangeRequest {
    StateChangeType change_type = 1;
    RequestParameter request_parameter = 2;
}

message StateChangeResponse {
    ResponseResult response = 1;
    repeated WoWActivitySnapshot snapshots = 2;  // Populated by SnapshotQueryRequest responses
}

enum BotRunnerType {
    FOREGROUND = 0;  // Inject into existing WoW process (DLL injection)
    BACKGROUND = 1;  // Headless bot runner (no WoW client)
}

message CharacterDefinition {
    string account_name = 1;
    float openness = 2;
    float conscientiousness = 3;
    float extraversion = 4;
    float agreeableness = 5;
    float neuroticism = 6;
    bool should_run = 7;
    BotRunnerType runner_type = 8;  // Which bot runner to use
    string build_template = 9;     // P22.28: Template name (e.g. "FuryWarriorPreRaid", "HolyPriestMCReady")
}

enum StateChangeType {
    NAME = 0;
    OPENNESS = 1;
    CONSCIENTIOUSNESS = 2;
    EXTRAVERSION = 3;
    AGREEABLENESS = 4;
    NEUROTICISM = 5;
    COORDINATOR_ENABLED = 6;
    DRAIN_PENDING_ACTIONS = 7;
}

enum ResponseResult {
	SUCCESS = 0;
	FAILURE = 1;
	IN_PROGRESS = 2;
}

message RequestParameter {
    oneof parameter {
        float float_param = 1;
        int32 int_param = 2;
        int64 long_param = 3;
        string string_param = 4;
    }
}

// Connection lifecycle state — deterministic, packet-driven.
// Replaces string-based screenState for machine consumption.
enum BotConnectionState {
    BOT_DISCONNECTED = 0;
    BOT_AUTHENTICATING = 1;
    BOT_CHAR_SELECT = 2;
    BOT_ENTERING_WORLD = 3;
    BOT_IN_WORLD = 4;
    BOT_TRANSFERRING = 5;       // Cross-map teleport / loading screen
    BOT_LOGGING_OUT = 6;
}

message WoWActivitySnapshot {
    uint32 timestamp = 1;
    string accountName = 2;
    game.WoWPlayer player = 3;
    ActionMessage previousAction = 4;
    ActionMessage currentAction = 5;
    repeated game.WoWGameObject nearbyObjects = 6;
    repeated game.WoWUnit nearbyUnits = 7;
    string characterName = 8;  // Name of the logged-in character (set after world entry)
    string screenState = 9;    // Current WoW screen state (e.g. "LoginScreen", "CharacterSelect", "InWorld")
    game.MovementData movementData = 10;  // Current movement physics snapshot (speeds, flags, position)
    uint64 partyLeaderGuid = 11;  // GUID of the party leader (0 if not in a group)
    repeated string recentChatMessages = 12;    // Recent chat messages (GM command responses, system messages)
    repeated string recentErrors = 13;          // Recent error/UI messages from the game client
    BotConnectionState connectionState = 14;    // Deterministic connection lifecycle state
    bool isObjectManagerValid = 15;             // Safe to read game objects / send actions
    bool isMapTransition = 16;                  // Loading screen or cross-map teleport in progress
    bool isDelta = 17;                          // If true, only populated fields have changed since last full snapshot
    uint32 snapshotSequence = 18;               // Monotonic sequence number for delta ordering
    uint32 baseSequence = 19;                   // Sequence number of the full snapshot this delta is based on
    uint32 currentMapId = 20;                   // Current map ID (top-level for reliable BG transfer detection)
    TravelObjective travel_objective = 21;      // Current travel objective (set by StateManager for goal-driven travel)
    CharacterGoals character_goals = 22;        // Build config / progression goals from CharacterSettings.BuildConfig
    ProgressionStatus progression_status = 23;  // Current progress toward goals (populated by StateManager)
    bool isIndoors = 24;                        // Runtime scene/environment classification from local physics
    string desired_party_leader_name = 25;      // Desired party/raid leader character name for local reconciliation
    repeated string desired_party_members = 26; // Desired party member character names this bot should ensure are grouped
    bool desired_party_is_raid = 27;            // True when the desired party shape should be upgraded to a raid
    bool is_heartbeat_only = 28;                // True when the bot is polling for a pending action without a meaningful state change; server must not overwrite CurrentActivityMemberList from this request
    LoadoutStatus loadout_status = 29;          // P3: per-bot progress through the ApplyLoadout action. Coordinator gates raid-formation on all bots reporting LOADOUT_READY.
    string loadout_failure_reason = 30;         // P3: populated when loadout_status=LOADOUT_FAILED; human-readable fail step for diagnostics.
}

// P3: progress states for a bot's single ApplyLoadout action.
enum LoadoutStatus {
    LOADOUT_NOT_STARTED = 0;   // Coordinator has not yet sent the spec, or BotRunner has not yet picked it up.
    LOADOUT_IN_PROGRESS = 1;   // LoadoutTask is actively executing plan steps.
    LOADOUT_READY = 2;         // All spec items applied (or already present). Bot is safe to raid-invite + queue.
    LOADOUT_FAILED = 3;        // Irrecoverable error in a plan step; see loadout_failure_reason.
}

// P3: per-slot equip directive. inventory_slot=0 means "let server pick the default slot".
message LoadoutEquipItem {
    uint32 item_id = 1;
    uint32 inventory_slot = 2;
}

// P3: skill training directive. Values are the target skill values; BotRunner only raises, never lowers.
message LoadoutSkillValue {
    uint32 skill_id = 1;
    uint32 value = 2;
    uint32 max = 3;
}

// P3: faction standing directive. BotRunner uses `.modify reputation` or equivalent to reach at least `standing`.
message LoadoutFactionRep {
    uint32 faction_id = 1;
    int32 standing = 2;
}

// P3: single-message description of everything a character needs to become
// raid-ready for its configured activity. StateManager hands this off once
// per bot via ActionType.APPLY_LOADOUT; BotRunner executes it at its own
// pace and reports completion via WoWActivitySnapshot.loadout_status. Empty
// / zero-valued fields mean "don't change" so the spec is additive.
message LoadoutSpec {
    uint32 target_level = 1;
    uint32 honor_rank = 2;
    uint32 riding_skill = 3;            // Target riding skill value (0/75/150/300).
    uint32 mount_spell_id = 4;           // Mount summon spell to learn (0 = no mount).
    uint32 armor_set_id = 5;             // `.additemset <id>` token from MaNGOS item_template.
    repeated uint32 spell_ids_to_learn = 6;
    repeated LoadoutSkillValue skills = 7;
    repeated LoadoutEquipItem equip_items = 8;
    repeated uint32 supplemental_item_ids = 9;
    repeated uint32 elixir_item_ids = 10;
    repeated LoadoutFactionRep faction_reps = 11;
    repeated uint32 completed_quest_ids = 12;
    string talent_template = 13;          // Optional named talent plan (e.g. "FuryWarriorPreRaid").
}

// Progress toward character goals. StateManager populates from snapshot + goal comparison.
message ProgressionStatus {
    float gear_completion_pct = 1;              // % of BiS slots filled (0.0-1.0)
    int32 gold_progress = 2;                    // Current copper balance
    string current_objective = 3;               // Human-readable current goal ("Farming Cape of the Black Baron")
    repeated string completed_quest_chains = 4; // Quest chain IDs already completed
    int32 profession_gaps = 5;                  // Number of professions below target level
}

// Character progression goals from CharacterBuildConfig.
// StateManager populates from CharacterSettings. BotRunner reads to drive behavior.
message CharacterGoals {
    string spec_name = 1;                       // BotProfile spec name (e.g. "WarriorFury")
    string talent_build_name = 2;               // Talent build key
    int32 gold_target_copper = 3;               // Savings goal in copper
    repeated string skill_priorities = 4;       // Profession targets (e.g. "Mining:300")
    repeated string quest_chains = 5;           // Quest chain IDs to complete
    int32 max_consumable_spend_copper = 6;      // Per-session consumable budget (0=unlimited)
}

// Cross-world travel objective. StateManager sets this on a bot's snapshot
// to indicate where the bot should travel next. BotRunner decomposes via
// CrossMapRouter into walk/flight/transport/portal legs.
message TravelObjective {
    uint32 target_map_id = 1;
    game.Position target_position = 2;
    string target_location_name = 3;    // Friendly name (resolved by LocationResolver)
    bool allow_hearthstone = 4;
    bool allow_class_teleport = 5;
}

// Structured log entry for named pipe IPC (replaces JSON serialization).
// Used by ForegroundBotRunner → StateManager log pipe.
message LogEntry {
    string level = 1;       // Trace, Debug, Information, Warning, Error, Critical
    string category = 2;    // Logger category name
    string message = 3;     // Log message text
    string timestamp = 4;   // ISO 8601 UTC timestamp
}
