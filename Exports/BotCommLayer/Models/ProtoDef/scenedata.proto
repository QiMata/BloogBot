syntax = "proto3";

package scenedata;
option csharp_namespace = "SceneData";

// Request scene collision data for a bounded region of a map.
// The service extracts triangles from VMAP + ADT within the specified bounds.
message SceneGridRequest {
    uint32 map_id = 1;
    float min_x = 2;
    float min_y = 3;
    float max_x = 4;
    float max_y = 5;
}

// Response containing collision triangles for the requested region.
message SceneGridResponse {
    uint32 map_id = 1;
    float min_x = 2;
    float min_y = 3;
    float max_x = 4;
    float max_y = 5;

    // Packed triangle data: 9 floats per triangle (3 vertices × 3 components)
    repeated float triangle_data = 6;

    // Per-triangle walkability flags (1 = walkable, 0 = wall/obstacle)
    repeated bool walkable = 7;

    // Per-triangle normal (3 floats per triangle: nx, ny, nz)
    repeated float normal_data = 8;

    uint32 triangle_count = 9;

    // Status
    bool success = 10;
    string error_message = 11;
}

// Tile-based scene data request (preferred over SceneGridRequest).
// Each tile is 533.33y × 533.33y, matching WoW's ADT grid.
// Bot requests tiles by (mapId, tileX, tileY). Service returns
// pre-split triangle data from .scenetile files.
message SceneTileRequest {
    uint32 map_id = 1;
    uint32 tile_x = 2;
    uint32 tile_y = 3;
}

message SceneTileResponse {
    uint32 map_id = 1;
    uint32 tile_x = 2;
    uint32 tile_y = 3;

    // Packed triangle data: 9 floats per triangle (3 vertices × 3 components)
    // Used when triangle_data_compressed is empty (uncompressed fallback).
    repeated float triangle_data = 4;

    // Per-triangle normal — no longer populated (C++ recomputes from vertices)
    repeated float normal_data = 5;

    // Per-triangle walkability — no longer populated
    repeated bool walkable = 6;

    uint32 triangle_count = 7;
    bool success = 8;
    string error_message = 9;

    // Tile world-space bounds (for client-side spatial index rebuild)
    float min_x = 10;
    float min_y = 11;
    float max_x = 12;
    float max_y = 13;

    // GZip-compressed triangle vertex data (9 floats × 4 bytes per triangle).
    // When present, triangle_data is empty — client decompresses this instead.
    bytes triangle_data_compressed = 14;
}

// Liquid data for a region
message LiquidGridRequest {
    uint32 map_id = 1;
    float min_x = 2;
    float min_y = 3;
    float max_x = 4;
    float max_y = 5;
}

message LiquidGridResponse {
    uint32 map_id = 1;
    // Packed liquid cell data
    repeated float liquid_levels = 2;  // Z level per cell
    repeated uint32 liquid_types = 3;  // type per cell
    float cell_size = 4;
    uint32 cells_x = 5;
    uint32 cells_y = 6;
    bool success = 7;
}
